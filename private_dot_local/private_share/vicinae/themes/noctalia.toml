# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - dark variant"
variant = "dark"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#feb786"
accent_foreground = "#4f2501"
background = "#18120f"
foreground = "#ece0da"
secondary_background = "#241e1b"
border = "#52443b"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#52443b"  # Softer for main app

[colors.settings_window]
border = "#9f8d83"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#feb786"
green = "#cbca7e"
magenta = "#e5bfa7"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#cbca7e", lighter = 80 }
cyan = { name = "#feb786", lighter = 50 }
purple = "#e5bfa7"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#ece0da"
muted = "#d7c3b7"
danger = "#ffb4ab"
success = "#cbca7e"
placeholder = { name = "#d7c3b7", opacity = 0.6 }

[colors.text.selection]
background = "#feb786"
foreground = "#4f2501"

[colors.text.links]
default = "#feb786"
visited = { name = "#cbca7e", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#9f8d83"
border_focus = "#feb786"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#2f2925"
foreground = "#ece0da"

[colors.button.primary.hover]
background = "#3a332f"  

[colors.button.primary.focus]
outline = "#feb786"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#6b3b14", opacity = 0.25 }  
foreground = "#ece0da"

[colors.list.item.selection]
background = { name = "#6b3b14", opacity = 0.50 }
foreground = "#ffdcc6"
secondary_background = "#6b3b14"
secondary_foreground = "#ffdcc6"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#241e1b"

[colors.grid.item.hover]
outline = { name = "#e5bfa7", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#feb786" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#feb786", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#feb786"
spinner = "#feb786"

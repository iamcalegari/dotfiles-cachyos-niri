# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - dark variant"
variant = "dark"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#adc6ff"
accent_foreground = "#002e69"
background = "#11131a"
foreground = "#e1e2eb"
secondary_background = "#1d2026"
border = "#424753"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#424753"  # Softer for main app

[colors.settings_window]
border = "#8c909f"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#adc6ff"
green = "#f4aeff"
magenta = "#b1c6f7"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#f4aeff", lighter = 80 }
cyan = { name = "#adc6ff", lighter = 50 }
purple = "#b1c6f7"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#e1e2eb"
muted = "#c2c6d5"
danger = "#ffb4ab"
success = "#f4aeff"
placeholder = { name = "#c2c6d5", opacity = 0.6 }

[colors.text.selection]
background = "#adc6ff"
foreground = "#002e69"

[colors.text.links]
default = "#adc6ff"
visited = { name = "#f4aeff", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#8c909f"
border_focus = "#adc6ff"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#272a31"
foreground = "#e1e2eb"

[colors.button.primary.hover]
background = "#32353c"  

[colors.button.primary.focus]
outline = "#adc6ff"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#004494", opacity = 0.25 }  
foreground = "#e1e2eb"

[colors.list.item.selection]
background = { name = "#004494", opacity = 0.50 }
foreground = "#d8e2ff"
secondary_background = "#004494"
secondary_foreground = "#d8e2ff"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#1d2026"

[colors.grid.item.hover]
outline = { name = "#b1c6f7", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#adc6ff" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#adc6ff", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#adc6ff"
spinner = "#adc6ff"

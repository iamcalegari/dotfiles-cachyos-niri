# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - light variant"
variant = "light"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#005ac1"
accent_foreground = "#ffffff"
background = "#f9f9ff"
foreground = "#191b22"
secondary_background = "#ecedf7"
border = "#c2c6d5"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#c2c6d5"  # Softer for main app

[colors.settings_window]
border = "#727785"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#005ac1"
green = "#8d39a2"
magenta = "#495e89"
orange = { name = "#ba1a1a", lighter = 40 }
red = "#ba1a1a"
yellow = { name = "#8d39a2", lighter = 80 }
cyan = { name = "#005ac1", lighter = 50 }
purple = "#495e89"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#191b22"
muted = "#424753"
danger = "#ba1a1a"
success = "#8d39a2"
placeholder = { name = "#424753", opacity = 0.6 }

[colors.text.selection]
background = "#005ac1"
foreground = "#ffffff"

[colors.text.links]
default = "#005ac1"
visited = { name = "#8d39a2", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#727785"
border_focus = "#005ac1"
border_error = "#ba1a1a"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#e7e7f1"
foreground = "#191b22"

[colors.button.primary.hover]
background = "#e1e2eb"  

[colors.button.primary.focus]
outline = "#005ac1"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#d8e2ff", opacity = 0.25 }  
foreground = "#191b22"

[colors.list.item.selection]
background = { name = "#d8e2ff", opacity = 0.50 }
foreground = "#001a41"
secondary_background = "#d8e2ff"
secondary_foreground = "#001a41"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#ecedf7"

[colors.grid.item.hover]
outline = { name = "#495e89", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#005ac1" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#005ac1", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#005ac1"
spinner = "#005ac1"

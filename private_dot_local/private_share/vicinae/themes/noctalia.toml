# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - dark variant"
variant = "dark"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#c5c0ff"
accent_foreground = "#2c2767"
background = "#131317"
foreground = "#e5e1e7"
secondary_background = "#201f24"
border = "#474650"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#474650"  # Softer for main app

[colors.settings_window]
border = "#928f9b"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#c5c0ff"
green = "#fbafe3"
magenta = "#c7c3e3"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#fbafe3", lighter = 80 }
cyan = { name = "#c5c0ff", lighter = 50 }
purple = "#c7c3e3"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#e5e1e7"
muted = "#c8c5d1"
danger = "#ffb4ab"
success = "#fbafe3"
placeholder = { name = "#c8c5d1", opacity = 0.6 }

[colors.text.selection]
background = "#c5c0ff"
foreground = "#2c2767"

[colors.text.links]
default = "#c5c0ff"
visited = { name = "#fbafe3", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#928f9b"
border_focus = "#c5c0ff"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#2a292e"
foreground = "#e5e1e7"

[colors.button.primary.hover]
background = "#353439"  

[colors.button.primary.focus]
outline = "#c5c0ff"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#433f7f", opacity = 0.25 }  
foreground = "#e5e1e7"

[colors.list.item.selection]
background = { name = "#433f7f", opacity = 0.50 }
foreground = "#e3dfff"
secondary_background = "#433f7f"
secondary_foreground = "#e3dfff"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#201f24"

[colors.grid.item.hover]
outline = { name = "#c7c3e3", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#c5c0ff" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#c5c0ff", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#c5c0ff"
spinner = "#c5c0ff"

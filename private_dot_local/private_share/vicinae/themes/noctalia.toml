# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - dark variant"
variant = "dark"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#efb7d0"
accent_foreground = "#4a2438"
background = "#161214"
foreground = "#eae0e2"
secondary_background = "#231e20"
border = "#4f4448"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#4f4448"  # Softer for main app

[colors.settings_window]
border = "#9c8d92"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#efb7d0"
green = "#f9b89f"
magenta = "#dbbfca"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#f9b89f", lighter = 80 }
cyan = { name = "#efb7d0", lighter = 50 }
purple = "#dbbfca"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#eae0e2"
muted = "#d3c2c8"
danger = "#ffb4ab"
success = "#f9b89f"
placeholder = { name = "#d3c2c8", opacity = 0.6 }

[colors.text.selection]
background = "#efb7d0"
foreground = "#4a2438"

[colors.text.links]
default = "#efb7d0"
visited = { name = "#f9b89f", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#9c8d92"
border_focus = "#efb7d0"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#2d292a"
foreground = "#eae0e2"

[colors.button.primary.hover]
background = "#383335"  

[colors.button.primary.focus]
outline = "#efb7d0"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#633a4f", opacity = 0.25 }  
foreground = "#eae0e2"

[colors.list.item.selection]
background = { name = "#633a4f", opacity = 0.50 }
foreground = "#ffd8e8"
secondary_background = "#633a4f"
secondary_foreground = "#ffd8e8"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#231e20"

[colors.grid.item.hover]
outline = { name = "#dbbfca", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#efb7d0" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#efb7d0", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#efb7d0"
spinner = "#efb7d0"

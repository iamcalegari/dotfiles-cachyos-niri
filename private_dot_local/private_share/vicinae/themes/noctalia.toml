# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - dark variant"
variant = "dark"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#fbb88e"
accent_foreground = "#4e2507"
background = "#171210"
foreground = "#ece0db"
secondary_background = "#241e1b"
border = "#52443c"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#52443c"  # Softer for main app

[colors.settings_window]
border = "#9f8d84"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#fbb88e"
green = "#c7cb87"
magenta = "#e3bfab"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#c7cb87", lighter = 80 }
cyan = { name = "#fbb88e", lighter = 50 }
purple = "#e3bfab"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#ece0db"
muted = "#d6c3b8"
danger = "#ffb4ab"
success = "#c7cb87"
placeholder = { name = "#d6c3b8", opacity = 0.6 }

[colors.text.selection]
background = "#fbb88e"
foreground = "#4e2507"

[colors.text.links]
default = "#fbb88e"
visited = { name = "#c7cb87", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#9f8d84"
border_focus = "#fbb88e"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#2f2926"
foreground = "#ece0db"

[colors.button.primary.hover]
background = "#3a3330"  

[colors.button.primary.focus]
outline = "#fbb88e"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#693b1b", opacity = 0.25 }  
foreground = "#ece0db"

[colors.list.item.selection]
background = { name = "#693b1b", opacity = 0.50 }
foreground = "#ffdbc8"
secondary_background = "#693b1b"
secondary_foreground = "#ffdbc8"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#241e1b"

[colors.grid.item.hover]
outline = { name = "#e3bfab", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#fbb88e" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#fbb88e", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#fbb88e"
spinner = "#fbb88e"

# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - dark variant"
variant = "dark"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#c6c6cb"
accent_foreground = "#2e3034"
background = "#141313"
foreground = "#e5e2e1"
secondary_background = "#201f20"
border = "#45474a"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#45474a"  # Softer for main app

[colors.settings_window]
border = "#909095"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#c6c6cb"
green = "#cec4c9"
magenta = "#c7c6c8"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#cec4c9", lighter = 80 }
cyan = { name = "#c6c6cb", lighter = 50 }
purple = "#c7c6c8"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#e5e2e1"
muted = "#c6c6cb"
danger = "#ffb4ab"
success = "#cec4c9"
placeholder = { name = "#c6c6cb", opacity = 0.6 }

[colors.text.selection]
background = "#c6c6cb"
foreground = "#2e3034"

[colors.text.links]
default = "#c6c6cb"
visited = { name = "#cec4c9", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#909095"
border_focus = "#c6c6cb"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#2a2a2a"
foreground = "#e5e2e1"

[colors.button.primary.hover]
background = "#353435"  

[colors.button.primary.focus]
outline = "#c6c6cb"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#45474b", opacity = 0.25 }  
foreground = "#e5e2e1"

[colors.list.item.selection]
background = { name = "#45474b", opacity = 0.50 }
foreground = "#e2e2e7"
secondary_background = "#45474b"
secondary_foreground = "#e2e2e7"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#201f20"

[colors.grid.item.hover]
outline = { name = "#c7c6c8", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#c6c6cb" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#c6c6cb", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#c6c6cb"
spinner = "#c6c6cb"
